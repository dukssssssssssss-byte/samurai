<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bayangan Ninja — Action Slash Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --night: #171a26;
    --night-deep: #0d0e16;
    --moon: #f4ecd8;
    --blood: #b3202e;
    --gold: #c9a24b;
    --shadow: #2b3044;
    --petal: #f2b6c4;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ margin:0; height:100%; overflow:hidden; }

  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(circle at 78% 12%, rgba(244,236,216,0.10), transparent 40%),
      linear-gradient(180deg, var(--night-deep) 0%, var(--night) 55%, #202537 100%);
    font-family:'Nunito', sans-serif;
    color: var(--moon);
    position:relative;
    user-select:none;
    -webkit-user-select:none;
  }

  h1{
    font-family:'Cinzel', serif;
    font-weight:800;
    font-size: 21px;
    letter-spacing: 2px;
    color: var(--gold);
    margin: 0 0 4px 0;
    text-align:center;
    text-shadow: 0 0 16px rgba(201,162,75,0.4);
  }

  .subtitle{
    font-size:12px;
    color: #a8a0b8;
    margin-bottom: 12px;
    text-align:center;
    padding: 0 16px;
  }

  .stage-wrap{
    position:relative;
    width: min(94vw, 440px);
    height: min(65vh, 480px);
    border-radius: 10px;
    overflow:hidden;
    border: 3px solid var(--blood);
    box-shadow: 0 0 0 4px rgba(201,162,75,0.12), 0 10px 40px rgba(0,0,0,0.6);
  }
  .stage-wrap.shake{ animation: shakeAnim 0.25s ease; }
  @keyframes shakeAnim{
    0%{ transform: translate(0,0); }
    20%{ transform: translate(-4px,2px); }
    40%{ transform: translate(4px,-2px); }
    60%{ transform: translate(-3px,-2px); }
    80%{ transform: translate(3px,2px); }
    100%{ transform: translate(0,0); }
  }

  #gameCanvas{
    width:100%;
    height:100%;
    display:block;
    touch-action: none;
  }

  .hud{
    position:absolute;
    top:8px;
    left:10px;
    right:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-family:'Cinzel', serif;
    font-weight:600;
    font-size: 12px;
    color: var(--gold);
    z-index:3;
  }

  .lives{ display:flex; gap:4px; }
  .life-dot{
    width:10px; height:10px;
    border-radius:50%;
    background: var(--blood);
  }
  .life-dot.lost{ background: rgba(179,32,46,0.15); }

  .mute-btn{
    background: transparent;
    border: none;
    font-size: 16px;
    padding: 0 4px;
    cursor:pointer;
  }

  .moon-deco{
    position:absolute;
    top:18px; right:18px;
    width:36px; height:36px;
    border-radius:50%;
    background: var(--moon);
    box-shadow: 0 0 24px 6px rgba(244,236,216,0.3);
    z-index:1;
  }

  .logo-badge{
    position:absolute;
    top:6px;
    left:6px;
    display:flex;
    align-items:center;
    gap:5px;
    z-index:4;
    background: rgba(13,14,22,0.45);
    border: 1px solid rgba(201,162,75,0.35);
    border-radius: 8px;
    padding: 3px 6px;
    backdrop-filter: blur(2px);
  }
  .logo-badge img{
    width: 26px;
    height: 26px;
    border-radius: 50%;
    object-fit: cover;
    display:block;
    box-shadow: 0 0 4px rgba(0,0,0,0.6);
  }

  .overlay{
    position:absolute;
    inset:0;
    background: rgba(13,14,22,0.93);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    gap: 12px;
    padding: 20px;
    z-index: 5;
  }
  .overlay.hidden{ display:none; }
  .overlay h2{
    font-family:'Cinzel', serif;
    font-weight:800;
    font-size: 20px;
    color: var(--blood);
    margin:0;
  }
  .overlay p{ margin:0; font-size:13px; color: #a8a0b8; line-height:1.6; }

  button{
    font-family:'Cinzel', serif;
    font-weight:700;
    font-size: 13px;
    background: var(--blood);
    color: var(--moon);
    border: none;
    padding: 13px 26px;
    border-radius: 6px;
    cursor:pointer;
    letter-spacing: 1px;
    transition: transform 0.08s ease, background 0.2s ease;
  }
  button:hover{ background: var(--gold); color: var(--night-deep); }
  button:active{ transform: translateY(2px); }

  .hint{
    margin-top: 12px;
    font-size: 12px;
    color: #8a8296;
    text-align:center;
    padding: 0 20px;
  }
</style>
</head>
<body>

  <div class="hud">
    <span id="score">SKOR: 0</span>
    <div class="lives" id="lives"></div>
    <button id="muteBtn" class="mute-btn">🔊</button>
  </div>
  <canvas id="gameCanvas"></canvas>

  <div class="overlay" id="startOverlay">
    <h2>SIAP BERTARUNG?</h2>
    <p>Bayangan musuh melintas di layar.<br><b>Gesek jarimu (swipe)</b> melewati mereka untuk menebas.<br>Jangan biarkan lolos — nyawamu terbatas.</p>
    <button id="startBtn">MULAI</button>
  </div>

  <div class="overlay hidden" id="gameOverOverlay">
    <h2>KALAH TERTEBAS</h2>
    <p id="finalScore">Skor kamu: 0</p>
    <button id="restartBtn">COBA LAGI</button>
  </div>
</div>

<div class="hint">Kontrolnya cuma gesek jari — pas untuk dimainkan di HP</div>

<script>
(function(){
  // ---- lightweight synth sound engine ----
  let audioCtx = null;
  let muted = false;
  function ensureAudio(){
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume();
  }
  function beep({freq=440, duration=0.1, type='square', vol=0.15, slideTo=null}={}){
    if(muted) return;
    try{
      ensureAudio();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      if(slideTo !== null){
        osc.frequency.exponentialRampToValueAtTime(Math.max(slideTo,1), audioCtx.currentTime + duration);
      }
      gain.gain.setValueAtTime(vol, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }catch(e){}
  }
  function sfxSlash(){ beep({freq:900, duration:0.08, type:'sawtooth', vol:0.08, slideTo:200}); }
  function sfxHit(){ beep({freq:300, duration:0.15, type:'triangle', vol:0.15, slideTo:80}); }
  function sfxCombo(streak){ beep({freq:500 + streak*30, duration:0.09, type:'triangle', vol:0.12, slideTo:1000+streak*30}); }
  function sfxLoseLife(){ beep({freq:160, duration:0.3, type:'sawtooth', vol:0.18, slideTo:50}); }
  function sfxGameOver(){ beep({freq:260, duration:0.5, type:'sawtooth', vol:0.16, slideTo:35}); }

  const muteBtn = document.getElementById('muteBtn');
  muteBtn.addEventListener('click', ()=>{
    muted = !muted;
    muteBtn.textContent = muted ? '🔇' : '🔊';
    if(!muted) ensureAudio();
  });

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const stageWrap = document.getElementById('stageWrap');
  let W, H;

  function resize(){
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    W = canvas.width; H = canvas.height;
  }
  window.addEventListener('resize', resize);

  const scoreEl = document.getElementById('score');
  const livesEl = document.getElementById('lives');
  const startOverlay = document.getElementById('startOverlay');
  const gameOverOverlay = document.getElementById('gameOverOverlay');
  const finalScoreEl = document.getElementById('finalScore');

  let enemies, particles, floatingTexts, petals, trail, score, lives, maxLives, combo, spawnTimer, difficultyTimer, running, loopId, lastTime;

  function shakeScreen(){
    stageWrap.classList.remove('shake');
    void stageWrap.offsetWidth;
    stageWrap.classList.add('shake');
  }

  function renderLives(){
    livesEl.innerHTML = '';
    for(let i=0;i<maxLives;i++){
      const d = document.createElement('div');
      d.className = 'life-dot' + (i >= lives ? ' lost' : '');
      livesEl.appendChild(d);
    }
  }

  function resetGame(){
    enemies = [];
    particles = [];
    floatingTexts = [];
    trail = [];
    petals = [];
    for(let i=0;i<12;i++){
      petals.push({ x: Math.random()*W, y: Math.random()*H, s: 3+Math.random()*4, drift: Math.random()*2-1, speed: 0.3+Math.random()*0.4, angle: Math.random()*Math.PI*2 });
    }
    score = 0;
    lives = 3;
    maxLives = 3;
    combo = 0;
    spawnTimer = 0;
    difficultyTimer = 0;
    running = true;
    scoreEl.textContent = 'SKOR: 0';
    renderLives();
  }

  // enemies move across the screen in straight paths (thrown shuriken-style, not falling)
  function spawnEnemy(){
    const fromLeft = Math.random() < 0.5;
    const r = 16 + Math.random()*7;
    const y = H*0.15 + Math.random()*H*0.6;
    const speed = (1.2 + Math.min(difficultyTimer/40000, 1.3) + Math.random()*0.4) * (fromLeft ? 1 : -1);
    enemies.push({
      x: fromLeft ? -30 : W+30,
      y,
      r,
      vx: speed,
      vy: (Math.random()-0.5)*0.5,
      spawnAge: 0,
      sliced: false
    });
  }

  function spawnParticles(x,y,color){
    for(let i=0;i<12;i++){
      const angle = Math.random()*Math.PI*2;
      const speed = 1 + Math.random()*3;
      particles.push({
        x, y,
        vx: Math.cos(angle)*speed,
        vy: Math.sin(angle)*speed,
        life: 400, maxLife: 400,
        color
      });
    }
  }

  function update(dt){
    if(!running) return;

    difficultyTimer += dt;
    spawnTimer += dt;
    const spawnGap = Math.max(600, 1500 - difficultyTimer/45);
    if(spawnTimer > spawnGap){
      spawnTimer = 0;
      spawnEnemy();
    }

    for(let i = enemies.length-1; i>=0; i--){
      const e = enemies[i];
      e.spawnAge = Math.min(e.spawnAge + dt, 160);
      e.x += e.vx*dt*0.06;
      e.y += e.vy*dt*0.06;
      if(e.x < -50 || e.x > W+50){
        enemies.splice(i,1);
        lives--;
        combo = 0;
        renderLives();
        shakeScreen();
        sfxLoseLife();
        if(lives <= 0){
          gameOver();
          return;
        }
      }
    }

    for(let i = particles.length-1; i>=0; i--){
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.05;
      p.life -= dt;
      if(p.life <= 0) particles.splice(i,1);
    }

    for(let i = floatingTexts.length-1; i>=0; i--){
      const t = floatingTexts[i];
      t.y -= 0.04*dt;
      t.life -= dt;
      if(t.life <= 0) floatingTexts.splice(i,1);
    }

    petals.forEach(p=>{
      p.y += p.speed*dt*0.06;
      p.x += p.drift*dt*0.02;
      p.angle += 0.001*dt;
      if(p.y > H+10){ p.y = -10; p.x = Math.random()*W; }
    });

    // fade sword trail
    for(let i = trail.length-1; i>=0; i--){
      trail[i].life -= dt;
      if(trail[i].life <= 0) trail.splice(i,1);
    }
  }

  function draw(){
    ctx.clearRect(0,0,W,H);

    // falling cherry petals (ambience)
    ctx.fillStyle = 'rgba(242,182,196,0.5)';
    petals.forEach(p=>{
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.beginPath();
      ctx.ellipse(0,0,p.s,p.s*0.6,0,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    });

    // enemies (shadow ninja shapes)
    enemies.forEach(e=>{
      const scale = 0.3 + 0.7*(e.spawnAge/160);
      const r = e.r * scale;
      ctx.save();
      ctx.translate(e.x, e.y);
      ctx.fillStyle = '#2b3044';
      ctx.beginPath();
      ctx.roundRect(-r*0.6, -r, r*1.2, r*2, r*0.4);
      ctx.fill();
      ctx.fillStyle = '#b3202e';
      ctx.beginPath();
      ctx.arc(0, -r*0.55, r*0.35, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#c9a24b';
      ctx.fillRect(-r*0.15, -r*0.65, r*0.3, r*0.12);
      ctx.restore();
    });

    // particles glow
    particles.forEach(p=>{
      const alpha = Math.max(0, p.life/p.maxLife);
      ctx.globalAlpha = alpha;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 8;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    });

    // floating score texts
    floatingTexts.forEach(t=>{
      const alpha = Math.max(0, t.life/t.maxLife);
      ctx.globalAlpha = alpha;
      ctx.font = "bold 13px 'Cinzel', serif";
      ctx.fillStyle = t.color;
      ctx.textAlign = 'center';
      ctx.fillText(t.text, t.x, t.y);
      ctx.globalAlpha = 1;
    });

    // sword trail (fading streak following swipe)
    if(trail.length > 1){
      ctx.save();
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      for(let i=1;i<trail.length;i++){
        const a = trail[i-1], b = trail[i];
        const alpha = Math.max(0, b.life/220);
        ctx.strokeStyle = `rgba(244,236,216,${alpha})`;
        ctx.lineWidth = 5 * alpha + 1;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
      ctx.restore();
    }

    // combo pulse
    if(combo > 2){
      const pulse = 1 + Math.sin(performance.now()*0.01)*0.06;
      ctx.save();
      ctx.translate(W/2, 24);
      ctx.scale(pulse, pulse);
      ctx.font = "bold 14px 'Cinzel', serif";
      ctx.fillStyle = '#c9a24b';
      ctx.textAlign = 'center';
      ctx.shadowColor = '#c9a24b';
      ctx.shadowBlur = 10;
      ctx.fillText('COMBO x' + combo, 0, 0);
      ctx.restore();
    }
  }

  function loop(ts){
    if(!lastTime) lastTime = ts;
    const dt = Math.min(ts - lastTime, 40);
    lastTime = ts;
    update(dt);
    draw();
    if(running){ loopId = requestAnimationFrame(loop); }
  }

  function gameOver(){
    running = false;
    sfxGameOver();
    finalScoreEl.textContent = 'Skor kamu: ' + score;
    gameOverOverlay.classList.remove('hidden');
  }

  function startGame(){
    ensureAudio();
    startOverlay.classList.add('hidden');
    gameOverOverlay.classList.add('hidden');
    resize();
    resetGame();
    lastTime = 0;
    cancelAnimationFrame(loopId);
    loopId = requestAnimationFrame(loop);
  }

  // ---- swipe slicing logic ----
  let pointerActive = false;
  let lastPoint = null;

  function getPos(clientX, clientY){
    const rect = canvas.getBoundingClientRect();
    return { x: clientX - rect.left, y: clientY - rect.top };
  }

  function trySlice(a, b){
    if(!running) return;
    for(let i = enemies.length-1; i>=0; i--){
      const e = enemies[i];
      if(e.sliced) continue;
      if(segmentCircleIntersect(a, b, e, e.r)){
        e.sliced = true;
        enemies.splice(i,1);
        combo++;
        const points = 10 + (combo > 5 ? 5 : 0);
        score += points;
        scoreEl.textContent = 'SKOR: ' + score;
        floatingTexts.push({ x: e.x, y: e.y, text: '+' + points, life: 500, maxLife: 500, color: '#c9a24b' });
        spawnParticles(e.x, e.y, '#b3202e');
        sfxHit();
        if(combo > 2) sfxCombo(combo);
      }
    }
  }

  function segmentCircleIntersect(a, b, circle, r){
    const dx = b.x - a.x, dy = b.y - a.y;
    const fx = a.x - circle.x, fy = a.y - circle.y;
    const aa = dx*dx + dy*dy;
    const bb = 2*(fx*dx + fy*dy);
    const cc = fx*fx + fy*fy - r*r;
    let disc = bb*bb - 4*aa*cc;
    if(disc < 0) return false;
    disc = Math.sqrt(disc);
    const t1 = (-bb - disc)/(2*aa);
    const t2 = (-bb + disc)/(2*aa);
    return (t1 >= 0 && t1 <= 1) || (t2 >= 0 && t2 <= 1) || (t1 < 0 && t2 > 1);
  }

  function pointerDown(x,y){
    pointerActive = true;
    lastPoint = { x, y };
    trail.push({ x, y, life: 220 });
    sfxSlash();
  }
  function pointerMove(x,y){
    if(!pointerActive) return;
    const p = { x, y };
    trail.push({ x, y, life: 220 });
    if(trail.length > 30) trail.shift();
    if(lastPoint){
      trySlice(lastPoint, p);
    }
    lastPoint = p;
  }
  function pointerUp(){
    pointerActive = false;
    lastPoint = null;
  }

  canvas.addEventListener('mousedown', (e)=>{ const p = getPos(e.clientX, e.clientY); pointerDown(p.x,p.y); });
  canvas.addEventListener('mousemove', (e)=>{ const p = getPos(e.clientX, e.clientY); pointerMove(p.x,p.y); });
  window.addEventListener('mouseup', pointerUp);

  canvas.addEventListener('touchstart', (e)=>{
    e.preventDefault();
    const t = e.changedTouches[0];
    const p = getPos(t.clientX, t.clientY);
    pointerDown(p.x,p.y);
  }, {passive:false});
  canvas.addEventListener('touchmove', (e)=>{
    e.preventDefault();
    const t = e.changedTouches[0];
    const p = getPos(t.clientX, t.clientY);
    pointerMove(p.x,p.y);
  }, {passive:false});
  canvas.addEventListener('touchend', (e)=>{ e.preventDefault(); pointerUp(); }, {passive:false});

  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('restartBtn').addEventListener('click', startGame);

  document.body.addEventListener('touchmove', (e)=>{ if(running) e.preventDefault(); }, {passive:false});

  resize();
  draw();
})();
</script>
</body>
</html>
